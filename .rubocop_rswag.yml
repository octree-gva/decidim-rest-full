# Rswag-related RuboCop: official alias config from the gem (get/post/path/response, …),
# plus project-specific RSpec DSL words for rswag request specs.
inherit_gem:
  rswag-specs: .rubocop_rspec_alias_config.yml

RSpec:
  Language:
    ExampleGroups:
      Regular:
        - path
        - response
        - get
        - post
        - patch
        - put
        - delete
        - head
        - options
        - trace
    Examples:
      Regular:
        - run_test!
