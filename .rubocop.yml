inherit_gem:
  decidim-dev: rubocop-decidim.yml
inherit_from:
  - .rubocop_rswag.yml
require:
  - rubocop-rspec
  - ./decidim-restfull-dev/lib/rubocop/cop/decidim/rest_full/async_api_mutation.rb
Gemspec/RequiredRubyVersion:
  Exclude:
    - decidim-restfull.gemspec  # Deprecated stub; loads decidim-restfull/decidim-restfull.gemspec

Naming/FileName:
  Exclude:
    - lib/decidim-rest_full.rb  # Gem entry point; name must match gem (hyphen).
    - decidim-restfull-core/lib/decidim-restfull-core.rb
    - decidim-restfull-dev/lib/decidim-restfull-dev.rb
    - decidim-restfull-proposals/lib/decidim-restfull-proposals.rb
    - decidim-restfull-blogs/lib/decidim-restfull-blogs.rb
    - decidim-restfull-accountabilities/lib/decidim-restfull-accountabilities.rb
    - decidim-restfull-budgets/lib/decidim-restfull-budgets.rb
    - decidim-restfull-debates/lib/decidim-restfull-debates.rb
    - decidim-restfull-meetings/lib/decidim-restfull-meetings.rb
    - decidim-restfull-sortition/lib/decidim-restfull-sortition.rb
    - decidim-restfull-surveys/lib/decidim-restfull-surveys.rb
    - decidim-restfull-forms/lib/decidim-restfull-forms.rb
    - decidim-restfull/lib/decidim-restfull.rb

Decidim/RestFull/AsyncApiMutation:
  Include:
    - decidim-restfull-*/app/controllers/decidim/api/rest_full/**/*.rb
  Exclude:
    - "**/forms/controller_helpers.rb"
    - "**/forms/submission_requests_controller.rb"

RSpec/VariableName:
    EnforcedStyle: snake_case
    AllowedPatterns:
      - '^[a-z_]+\[[a-z_]*\]\[\]$' # Allows symbols like locales[][] and filter[name_in][]
      - '^[a-z_]+\[[a-z_]*\]$' # Allows symbols like locales[] and filter[name_in]
      - 'Authorization' # Authorization header
