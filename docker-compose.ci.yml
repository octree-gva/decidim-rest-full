# Reproduces GitLab CI ruby::rspec job: ruby:3.2.2 + postgres:15 + redis
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: decidim
      POSTGRES_USER: decidim
      POSTGRES_PASSWORD: "TEST-insecure_password"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decidim -d decidim"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:latest

  rspec:
    image: ruby:3.2.2
    working_dir: /app
    volumes:
      - .:/app
    environment:
      POSTGRES_DB: decidim
      DATABASE_HOST: postgres
      DATABASE_PASSWORD: "TEST-insecure_password"
      DATABASE_USERNAME: decidim
      DISABLED_DOCKER_COMPOSE: "true"
      NODE_MAJOR: "18"
      SIMPLECOV: "1"
      CI: "1"
      RAILS_ENV: test
      DISABLE_SPRING: "1"
    depends_on:
      postgres:
        condition: service_healthy
    links:
      - postgres
      - redis
    entrypoint: []
    command: ["/bin/bash", "-c", "git config --global --add safe.directory /app || true; bin/setup-tests && bundle exec rspec spec/commands/ spec/requests/ spec/models/ spec/jobs/ spec/forms/ spec/lib/ spec/decidim/ --format progress --format RspecJunitFormatter --out rspec.xml"]
