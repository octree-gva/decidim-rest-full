services:
  rest_full:
    command: bash -c "git config --global --add safe.directory /home/decidim/module && bin/setup-tests && bundle exec rspec spec/commands/ spec/requests/ spec/models/ spec/jobs/ --format progress --format RspecJunitFormatter --out rspec.xml" 
    image: ruby:3.2.7
    entrypoint: ""
    volumes:
      - .:/home/decidim/module
    working_dir: /home/decidim/module
    environment:
      - PORT=3000
      - DATABASE_HOST=rest-full-pg
      - DATABASE_USERNAME=decidim
      - DATABASE_PASSWORD=pleaseChangeMe
      - DATABASE_URL=postgresql://decidim:pleaseChangeMe@rest-full-pg:5432/decidim
      - DEV_MODULE=decidim-rest_full
      - RAILS_ENV=test
      - NODE_MAJOR=18
      - SIMPLECOV=1
      - CI=1
      - DISABLE_SPRING=1
    ports:
      - 3000:3000
    links:
      - rest-full-pg
